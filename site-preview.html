<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元香 UNIO - 新前台预览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{font-family:'Noto Serif SC',serif}
    @keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .animate-breath{animation:breath 60s ease-in-out infinite}
    .animate-fade{animation:fade 0.5s ease-out}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const API='https://xuicjydgtoltdhkbqoju.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1aWNqeWRndG9sdGRoa2Jxb2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzI2NjgsImV4cCI6MjA5MTEwODY2OH0.7E-VPqi7m9WbCWw96jbEeVdVBVrwubIjAGEB-_MV5ng';
const IMG={h:'https://raw.githubusercontent.com/2008zxeric/unio-aroma/main/assets/hero/home-hero.webp',l:'https://raw.githubusercontent.com/2008zxeric/unio-aroma/main/assets/logo/unio-logo.webp'};
const SERIES={yuan:{n:'元',f:'元 · 单方',d:'极境生存原力'},he:{n:'和',f:'和 · 复方',d:'科学频率重构'},sheng:{n:'生',f:'生 · 纯露',d:'植物生命之水'},jing:{n:'香',f:'香 · 空间',d:'极简芳香美学'}};
const Loading=()=>React.createElement('div',{className:'min-h-screen flex items-center justify-center'},React.createElement('div',{className:'text-center'},React.createElement('div',{className:'w-16 h-16 mx-auto border-4 border-amber-200 border-t-amber-500 rounded-full animate-spin'}),React.createElement('p',{className:'mt-4 text-gray-500 text-sm'},'加载中...')));
const App=()=>{
 const[v,setV]=useState('home');
 const[sp,setSp]=useState(true);
 const[s,setS]=useState([]);
 const[p,setP]=useState([]);
 const[l,setL]=useState(true);
 useEffect(()=>{setTimeout(()=>setSp(false),2500)},[]);
 useEffect(()=>{
  Promise.all([
   fetch(API+'/rest/v1/series?is_active=eq.true&order=sort_order.asc',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}}).then(r=>r.json()),
   fetch(API+'/rest/v1/products?is_active=eq.true&limit=100',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}}).then(r=>r.json())
  ]).then(([a,b])=>{setS(a);setP(b);setL(false)});
 },[]);
 const nav=x=>setV(x);
 const cnt=code=>p.filter(x=>x.series_code===code).length;
 const Home=()=>React.createElement('div',null,
  React.createElement('section',{className:'h-screen relative flex items-center justify-center overflow-hidden'},
   React.createElement('img',{src:IMG.h,className:'absolute inset-0 w-full h-full object-cover animate-breath'}),
   React.createElement('div',{className:'absolute inset-0 bg-black/40'}),
   React.createElement('div',{className:'relative z-10 text-center text-white'},
    React.createElement('h1',{className:'text-8xl sm:text-[12rem] font-bold tracking-widest'},'元香 ',React.createElement('span',{className:'italic text-white/80'},'UNIO')),
    React.createElement('p',{className:'text-sm sm:text-2xl tracking-widest opacity-40 mt-4'},'Original Harmony Sanctuary')
   )
  ),
  React.createElement('section',{className:'py-32 px-6 bg-stone-50'},
   React.createElement('div',{className:'max-w-6xl mx-auto text-center space-y-8'},
    React.createElement('h2',{className:'text-4xl sm:text-7xl font-bold text-gray-800'},'廿三载寻香志'),
    React.createElement('p',{className:'text-lg sm:text-2xl text-gray-500'},'始于神州西南，专业深耕，迹遍全球极境。'),
    React.createElement('button',{onClick:()=>nav('collections'),className:'px-12 py-4 bg-green-900 text-white rounded-full font-bold tracking-widest hover:bg-red-700 transition'},'探索馆藏')
   )
  ),
  React.createElement('section',{className:'py-16 px-4 grid grid-cols-2 lg:grid-cols-4 gap-4 max-w-7xl mx-auto'},
   s.map(x=>React.createElement('div',{key:x.id,onClick:()=>nav('collections'),className:'group relative aspect-[3/4] rounded-2xl overflow-hidden cursor-pointer shadow-lg hover:scale-105 transition-all'},
    React.createElement('img',{src:IMG.h,className:'absolute inset-0 w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700'}),
    React.createElement('div',{className:'absolute inset-0 bg-gradient-to-t from-black/90 to-transparent'}),
    React.createElement('div',{className:'absolute bottom-0 left-0 right-0 p-4 text-white'},
     React.createElement('h3',{className:'text-xl sm:text-3xl font-bold'},SERIES[x.code]?.n,' · ',SERIES[x.code]?.f?.split('·')[1]?.trim()),
     React.createElement('p',{className:'text-xs text-white/50 mt-1'},cnt(x.code),' 款产品')
    )
   ))
  )
 );
 const Cols=()=>React.createElement('div',{className:'pt-24 pb-32 px-4 min-h-screen'},
  React.createElement('button',{onClick:()=>nav('home'),className:'mb-6 text-gray-500 hover:text-black'},'← 返回首页'),
  l?React.createElement(Loading):React.createElement('div',{className:'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 max-w-7xl mx-auto'},
   p.map(x=>React.createElement('div',{key:x.id,className:'bg-white rounded-xl overflow-hidden shadow hover:shadow-xl transition cursor-pointer'},
    React.createElement('div',{className:'aspect-[3/4] bg-gray-100'},x.image_url?React.createElement('img',{src:x.image_url,className:'w-full h-full object-cover',alt:x.name_cn}):React.createElement('div',{className:'w-full h-full flex items-center justify-center text-gray-400'},'暂无')),
    React.createElement('div',{className:'p-3'},React.createElement('h3',{className:'font-bold text-sm text-gray-800 truncate'},x.name_cn),x.price_10ml&&React.createElement('p',{className:'text-xs text-amber-600 mt-1'},'¥'+x.price_10ml))
   ))
  )
 );
 return React.createElement('div',{className:'min-h-screen bg-white relative'},
  sp&&React.createElement('div',{className:'fixed inset-0 z-50 bg-white flex items-center justify-center'},
   React.createElement('div',{className:'text-center space-y-6 animate-fade'},
    React.createElement('img',{src:IMG.l,className:'w-28 mx-auto drop-shadow-xl animate-pulse'}),
    React.createElement('h2',{className:'text-4xl font-bold tracking-widest text-green-900'},'元香 UNIO'),
    React.createElement('p',{className:'text-xs tracking-widest text-gray-400 uppercase'},'Original Harmony Sanctuary')
   )
  ),
  v==='home'&&React.createElement(Home),
  v==='collections'&&React.createElement(Cols),
  React.createElement('nav',{className:'fixed bottom-4 left-0 right-0 flex justify-center px-4 z-40'},
   React.createElement('div',{className:'bg-white/95 backdrop-blur-xl border border-white/50 rounded-full px-3 py-2 shadow-2xl flex gap-1'},
    [{id:'home',l:'首页'},{id:'story',l:'叙事'},{id:'atlas',l:'寻香'},{id:'collections',l:'馆藏'}].map(x=>React.createElement('button',{key:x.id,onClick:()=>nav(x.id),className:'px-4 py-2 rounded-full text-xs font-bold tracking-wider transition '+(v===x.id||(x.id==='home'&&v==='home')?'bg-black text-white':'text-gray-400 hover:text-black')},x.l))
   )
  )
 );
};
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
