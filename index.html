<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元香Unio | Unio Aroma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@200;300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --moss-green: #2C3E28;
            --terracotta: #D75437;
            --stone-grey: #F5F5F5;
            --azure-blue: #1C39BB;
            --warm-amber: #D4AF37;
        }
        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background-color: var(--stone-grey);
            color: #1a1a1a;
            cursor: default;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-serif-zh { font-family: 'Noto Serif SC', serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .paper-texture {
            position: relative;
        }
        .paper-texture::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.025;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 增强文字在复杂背景下的可读性 */
        .text-readable-shadow {
            text-shadow: 0 2px 15px rgba(0,0,0,0.3), 0 0 30px rgba(255,255,255,0.2);
        }
        .text-dark-shadow {
            text-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.5);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .img-fade-in {
            animation: fadeIn 2s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); filter: blur(20px); }
            to { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        .btn-rednote {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-rednote:hover {
            letter-spacing: 1.5em;
            background-color: #D75437;
        }

        /* Logo 专属呼吸光晕 */
        .logo-glow {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8)) brightness(1.1);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="paper-texture">
    <div id="root"></div>
    <!-- 关键修复：显式引入入口文件 -->
    <script type="module" src="index.tsx"></script>
</body>
</html>
